<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>晓光原野 · PSTI人格测试</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }

        body {
            min-height: 100vh;
            background: linear-gradient(145deg, #fef9e7 0%, #f7e9c0 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', 'Roboto', 'Noto Serif SC', 'Microsoft YaHei', serif;
            padding: 20px;
            position: relative;
            overflow-x: hidden;
            line-height: 1.6;
        }

        .ambient-field {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            pointer-events: none;
            overflow: hidden;
            background: radial-gradient(circle at 30% 20%, rgba(255,240,160,0.6), rgba(155, 190, 90, 0.15));
        }
        .field-glow {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 40%;
            background: linear-gradient(to top, rgba(160, 195, 85, 0.25), rgba(245, 225, 130, 0.1));
            pointer-events: none;
        }

        .cloud {
            position: absolute;
            background: rgba(255, 254, 245, 0.9);
            border-radius: 1000px;
            box-shadow: 0 20px 35px -8px rgba(0, 0, 0, 0.03), 0 0 0 1px rgba(255,248,220,0.7);
            backdrop-filter: blur(8px);
            animation: floatCloudSlow linear infinite;
            z-index: 0;
        }

        @keyframes floatCloudSlow {
            0% { transform: translateX(-15%) translateY(0px); }
            50% { transform: translateX(8%) translateY(-15px); }
            100% { transform: translateX(25%) translateY(8px); }
        }

        .app-container {
            position: relative;
            z-index: 20;
            max-width: 720px;
            width: 100%;
            background: rgba(255, 254, 247, 0.96);
            backdrop-filter: blur(5px);
            border-radius: 64px;
            box-shadow: 0 30px 50px -20px rgba(80, 60, 30, 0.25), 0 0 0 1px rgba(220, 190, 110, 0.6);
            overflow: hidden;
            transition: all 0.3s ease;
        }

        .screen {
            padding: 2.5rem 2rem 3rem;
            transition: opacity 0.3s ease;
        }

        .title {
            font-size: 2.8rem;
            font-weight: 700;
            font-family: 'Noto Serif SC', 'Georgia', serif;
            letter-spacing: 3px;
            background: linear-gradient(135deg, #d19648, #f5c878, #a57535);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 0.5rem;
            text-align: center;
            text-shadow: 2px 2px 15px rgba(255,230,140,0.7);
            line-height: 1.3;
        }

        .question-text {
            font-size: 1.8rem;
            font-weight: 500;
            color: #634828;
            margin: 1.8rem 0 1.5rem;
            text-align: center;
            letter-spacing: 0.5px;
            font-family: 'Noto Serif SC', 'Georgia', serif;
            line-height: 1.5;
        }

        .options {
            display: flex;
            flex-direction: column;
            gap: 15px;
            margin: 25px 0 15px;
        }

        .option-btn {
            background: #fffdf5;
            border: 1px solid #f8e8c8;
            border-radius: 60px;
            padding: 15px 24px;
            font-size: 1.1rem;
            font-weight: 500;
            text-align: left;
            color: #5e4022;
            transition: all 0.25s;
            cursor: pointer;
            font-family: inherit;
            box-shadow: 0 3px 6px rgba(0,0,0,0.03);
            backdrop-filter: blur(3px);
            line-height: 1.5;
        }

        .option-btn:hover {
            background: #fff8eb;
            transform: scale(0.985);
            border-color: #e9cd9c;
            box-shadow: 0 8px 15px -8px rgba(110, 70, 20, 0.18);
        }

        .option-btn.selected {
            background: #fef2e0;
            border-color: #e2b86e;
        }

        .click-hint, .extra-note {
            font-size: 0.9rem;
            color: #c08248;
            margin-top: 15px;
            padding-left: 15px;
            border-left: 3px solid #f9d8a8;
            font-style: normal;
            font-weight: 450;
            line-height: 1.6;
        }

        .extra-note {
            background: #fff9f0;
            border-radius: 32px;
            padding: 12px 20px;
            text-align: center;
            border-left: none;
            margin: 20px 0;
        }

        .action-btn {
            background: #f0c478;
            border: none;
            padding: 14px 28px;
            border-radius: 48px;
            font-weight: 600;
            font-size: 1.1rem;
            color: #402c18;
            cursor: pointer;
            font-family: inherit;
            transition: 0.25s;
            width: 100%;
            text-align: center;
            margin-top: 20px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.06);
            letter-spacing: 1px;
            line-height: 1.5;
        }

        .action-btn:hover {
            background: #e8b058;
            transform: translateY(-3px);
            box-shadow: 0 10px 20px -8px #c88a42;
        }

        .next-btn {
            background: #9dbc68;
            margin-top: 15px;
        }

        .next-btn:hover {
            background: #8da855;
            box-shadow: 0 10px 20px -8px #7a9448;
        }

        .transition-stage {
            text-align: center;
            padding: 60px 20px;
            font-size: 3rem;
            font-weight: 800;
            min-height: 320px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: radial-gradient(ellipse at center, rgba(250, 240, 190, 0.35), transparent);
            border-radius: 56px;
        }

        .magic-word {
            font-size: 3.8rem;
            font-weight: 800;
            font-family: 'Courier New', 'Georgia', monospace;
            letter-spacing: 8px;
            background: linear-gradient(120deg, #e0a858, #fee0a8);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            transition: all 0.8s cubic-bezier(0.2, 0.9, 0.4, 1.1);
        }

        .gift-btn {
            background: #f5d09a;
            margin-top: 35px;
        }

        .gift-btn:hover {
            background: #eec078;
        }

        .message-card {
            background: rgba(255, 253, 245, 0.98);
            border-radius: 56px;
            padding: 30px 25px;
            text-align: center;
            border: 1px solid #f9e8c0;
            backdrop-filter: blur(4px);
            box-shadow: 0 10px 25px rgba(110, 80, 35, 0.09);
        }

        hr {
            margin: 25px 0;
            border: none;
            height: 2px;
            background: linear-gradient(90deg, #f9e8c0, #f0c478, #f9e8c0);
        }

        footer {
            font-size: 0.8rem;
            text-align: center;
            color: #ad7f48;
            margin-top: 30px;
            letter-spacing: 1px;
            line-height: 1.5;
        }

        .green-accent {
            color: #82a050;
        }

        .action-btn:disabled {
            background: #e2d0b0;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
            color: #806848;
        }
    </style>
</head>
<body>
<div class="ambient-field" id="cloudField">
    <div class="field-glow"></div>
</div>
<div class="app-container" id="app">
    <div class="screen" id="screenContent"></div>
</div>

<script>
    function generateSoftClouds() {
        const field = document.getElementById('cloudField');
        if (!field) return;
        const existingClouds = field.querySelectorAll('.cloud');
        existingClouds.forEach(c => c.remove());
        
        const cloudCount = 12;
        for (let i = 0; i < cloudCount; i++) {
            const cloud = document.createElement('div');
            cloud.classList.add('cloud');
            const w = 100 + Math.random() * 220;
            const h = 45 + Math.random() * 90;
            cloud.style.width = w + 'px';
            cloud.style.height = h + 'px';
            cloud.style.left = (Math.random() * 100) + '%';
            cloud.style.top = (Math.random() * 85) + '%';
            const duration = 45 + Math.random() * 50;
            cloud.style.animation = `floatCloudSlow ${duration}s infinite alternate ease-in-out`;
            cloud.style.animationDelay = (Math.random() * -40) + 's';
            cloud.style.opacity = 0.35 + Math.random() * 0.5;
            cloud.style.background = `radial-gradient(ellipse at 30% 40%, rgba(255,252,225,0.95), rgba(252,240,185,0.6))`;
            field.appendChild(cloud);
        }
    }

    window.addEventListener('load', () => {
        generateSoftClouds();
        window.addEventListener('resize', () => generateSoftClouds());
        // 初始化渲染
        render();
    });

    const branches = {
        branch1: { title: "做一只犀牛吧。", content: `为什么要有老鹰一样的眼睛？<br><br>有时候你想，这个世界上到底有什么比朦胧更美，值得看清。<br><br>那就闭上眼睛吧，别怕，我要带你走。<br><br>我们闻一闻晒了一早上的衬衣、从微波炉里拿出来的咖喱饭、街边的面包房和咖啡店，还有枕头上沾染的洗发水与梦。<br><br>然后我们去池沼上面，去幽谷上面，越过山和森林，越过云和大海，越过太阳那边，越过轻云之外，越过星空世界的无涯极限，凌驾于生活之上。` },
        branch2: { title: "快乐而不是胜利的真理，将被传播至永恒。", content: `生活是一场喜剧。<br><br>一个人是单口，两个人是漫才。<br><br>肢体喜剧交给身体，sketch交给大脑，即兴喜剧交给心，yes, and是我的回音。<br><br>大笑是最难的事，大笑也是最简单的事。<br><br>胜利只是括号里的注脚，我才不把生命活成胜利。<br><br>不像我们班的某某某一样，又想去，又不敢去，又怕不能赢。` },
        branch3: { title: "冷布丁好吃，热不丁也好吃。", content: `我不追求赢，也不追求输。<br><br>不追求快乐，更不追求哭。<br><br>不需要被理解，不需要被记住。<br><br>不需要意义，也不需要归宿。<br><br>我们什么都不需要，我们只需要把热布丁变成冷布丁。<br><br>因为……<br><br>欸欸欸——<br><br>梆梆！<br><br>心急吃不了热布丁。` },
        branch4: { title: "忘掉是一般人能做的唯一的事。", content: `忘掉，忘掉就可以不必再忍受。<br><br>忘掉就可以不必再痛苦。<br><br>忘掉你没有的东西，忘掉别人有的东西，忘掉你失去和以后不能得到的东西……<br><br>——可是不忘掉，是否已经算得到了呢？` },
        branch5: { title: "与神同行。", content: `史铁生说，神的完美在于仁慈。<br><br>仁慈在于，只要你往前走，他总是给路。<br><br>在神的字典里，行与路共用一种解释。<br><br>可能就是因为如此，地球才是圆的吧。<br><br>Fa so la，fa so la so fa mi re mi so la mi do。<br><br>既然如此，还有什么恐怕的呢。<br><br>或许伦敦是一炉终会燃烧的湿柴火，<br><br>或许大海是一片波光粼粼的三棱锥啊。` },
        branch6: { title: "全新的剧本，全新的剧情。", content: `I see a new day is coming.<br><br>写下全新的剧本全新的剧情。<br><br>无论晴天还是风雨，脚步从不会停。<br><br>追逐划过夜空的流星，也不错过日出的绚丽。<br><br>逝去的人推开门就能到达天堂，那一个活人呢？<br><br>一个活人推开门，去哪里都可以吧。` },
        branch7: { title: "没什么能让我吝啬我的表达。", content: `我穿梭在金黄的麦浪，徜徉蔚蓝的大海。<br><br>拨开黑色的夜幕，等待鲜红的日出。<br><br>这个世界不大，<br><br>刚好够我跑来跑去，<br><br>刚好够我为了享受快乐，用尽所有的颜色。<br><br>刚好够我躺在一片乱七八糟的颜料里，心满意足地说：<br><br>我画笔下的世界，都是我的。` },
        branch8: { title: "走吧，一起去寻找芦苇之地！", content: `让我来守护你，把你的手放在我手心。<br><br>守护你，有了彼此就所向无敌。<br><br>在第一百零一阵风里，<br><br>芦苇会长出连自己都不知道的骨头。<br><br>蝴蝶会追上日空中盘旋的鹰。` },
        branch9: { title: "毕竟爱是世间最伟大的魔法。", content: `谁说天上的地上的水与火不可能相见呢相爱呢？` },
        branch10: { title: "我们还是在这里吧。", content: `我们不要在这里。<br><br>跟我回去十八岁，<br><br>在6:30前出寝室，不要被宿管在楼梯拐角逮到。<br><br>在早自习偷偷吃早餐，不要被巡视的杨艳查到。<br><br>在美术课上速背及时雨，不要被下节课的朱越fail。<br><br>在考完圆锥曲线和数列后祷告，不要被李燕华杀掉。` },
        branch11: { title: "如梦之梦", content: `我祝你在聚光灯下，像一棵南阳街的桃树。<br><br>不必站得笔直。<br><br>歪一点，斜一点，带着莺声燕语，也带着枯叶与枯枝。<br><br>带着去年没好的旧伤，和今年还不想好的固执。<br><br>不必春天驱使，自是良辰吉日。<br><br>桃树上面开花了。<br><br>花瓣被风吹散，落在往来人的肩上。<br><br>每一片都是你的名字，每一片都是你的故事。` }
    };

    let state = {
        step: 'welcome',
        answers: { q1: null, q2: null, q3: null, q4: null, q5: null },
        extraNoteQ3: null,
        finalBranchId: null,
    };

    const appContainer = document.getElementById('screenContent');

    function render() {
        const s = state;
        if (s.step === 'welcome') renderWelcome();
        else if (s.step === 'q1') renderQ1();
        else if (s.step === 'q2') renderQ2();
        else if (s.step === 'q3') renderQ3();
        else if (s.step === 'q4') renderQ4();
        else if (s.step === 'q5') renderQ5();
        else if (s.step === 'transition') renderTransition();
        else if (s.step === 'gift') renderGift();
        else if (s.step === 'result') renderResult();
        else if (s.step === 'easterEgg') renderEasterEgg();
    }

    function renderWelcome() {
        appContainer.innerHTML = `
            <div style="text-align: center; padding: 20px 0 25px;">
                <div class="title">PSTI 人格测试</div>
                <div style="margin: 30px 0 25px;"><button class="action-btn" id="startBtn" style="background:#f5d09a;">◈ 开启 ◈</button></div>
            </div>
        `;
        document.getElementById('startBtn')?.addEventListener('click', () => { 
            state.step = 'q1'; 
            render(); 
        });
    }

    function renderQ1() {
        appContainer.innerHTML = `
            <div class="question-text">🌿 今天过得好吗？ 🌿</div>
            <div class="options">
                <button class="option-btn" data-val="great">【爽哉爽哉！】</button>
                <button class="option-btn" data-val="normal">【一如既往。】</button>
                <button class="option-btn" data-val="bad">【并不。】</button>
            </div>
            <div id="clickNote" class="click-hint"></div>
            <button class="action-btn next-btn" id="q1NextBtn" disabled>下一页 →</button>
        `;

        const nextBtn = document.getElementById('q1NextBtn');
        document.querySelectorAll('.option-btn').forEach(btn => {
            btn.addEventListener('click', (e) => {
                document.querySelectorAll('.option-btn').forEach(b => b.classList.remove('selected'));
                btn.classList.add('selected');
                
                const val = btn.dataset.val;
                state.answers.q1 = val;
                const noteDiv = document.getElementById('clickNote');
                
                if (val === 'great') noteDiv.innerText = '☀️ 这么开心？有啥开心的事说出来让我也开心开心！';
                else if (val === 'normal') noteDiv.innerText = '🌙 那就好吃好喝早睡早起！';
                else if (val === 'bad') noteDiv.innerText = '✨ 正好！这个测试就是为了治你。';
                
                nextBtn.disabled = false;
            });
        });

        nextBtn.addEventListener('click', () => {
            state.step = 'q2';
            render();
        });
    }

    function renderQ2() {
        appContainer.innerHTML = `
            <div class="question-text">🍃 你或许想要什么？ 🍃</div>
            <div class="options">
                <button class="option-btn" data-val="挣脱">【我想挣脱。】</button>
                <button class="option-btn" data-val="得到">【我想得到。】</button>
                <button class="option-btn" data-val="爱">【我想爱。】</button>
                <button class="option-btn" data-val="被爱">【我想被爱。】</button>
            </div>
            <button class="action-btn next-btn" id="q2NextBtn" disabled>下一页 →</button>
        `;

        const nextBtn = document.getElementById('q2NextBtn');
        document.querySelectorAll('.option-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.option-btn').forEach(b => b.classList.remove('selected'));
                btn.classList.add('selected');
                state.answers.q2 = btn.dataset.val;
                nextBtn.disabled = false;
            });
        });

        nextBtn.addEventListener('click', () => {
            state.step = 'q3';
            render();
        });
    }

    function renderQ3() {
        appContainer.innerHTML = `
            <div class="question-text">🕊️ 或许需要什么？ 🕊️</div>
            <div class="options">
                <button class="option-btn" data-val="勇气">【勇气】</button>
                <button class="option-btn" data-val="自由">【自由】</button>
                <button class="option-btn" data-val="passion">【Passion！】</button>
                <button class="option-btn" data-val="deadline">【现在立刻马上！谁帮我完成deadline！】</button>
                <button class="option-btn" data-val="jiachan">【家产在我面前酱酱酿酿......（淫笑）】</button>
            </div>
            <div id="specialNote" class="extra-note" style="display:none;"></div>
            <button class="action-btn next-btn" id="q3NextBtn" disabled>下一页 →</button>
        `;

        const nextBtn = document.getElementById('q3NextBtn');
        const specialNote = document.getElementById('specialNote');
        document.querySelectorAll('.option-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.option-btn').forEach(b => b.classList.remove('selected'));
                btn.classList.add('selected');
                
                const val = btn.dataset.val;
                state.answers.q3 = val;
                state.extraNoteQ3 = null;
                
                // 特殊提示逻辑
                if (val === 'deadline') {
                    state.extraNoteQ3 = '⏰ 别急！deadline会教会我们所有事～';
                    specialNote.innerText = state.extraNoteQ3;
                    specialNote.style.display = 'block';
                } else if (val === 'jiachan') {
                    state.extraNoteQ3 = '💰 好家伙！这志向我喜欢～';
                    specialNote.innerText = state.extraNoteQ3;
                    specialNote.style.display = 'block';
                } else {
                    specialNote.style.display = 'none';
                }
                
                nextBtn.disabled = false;
            });
        });

        nextBtn.addEventListener('click', () => {
            state.step = 'q4';
            render();
        });
    }

    function renderQ4() {
        appContainer.innerHTML = `
            <div class="question-text">⏳ 需要一台时光机？ ⏳</div>
            <div class="options">
                <button class="option-btn" data-val="past">【回到过去】</button>
                <button class="option-btn" data-val="present">【停在现在】</button>
                <button class="option-btn" data-val="future">【去往未来】</button>
            </div>
            <button class="action-btn next-btn" id="q4NextBtn" disabled>下一页 →</button>
        `;

        const nextBtn = document.getElementById('q4NextBtn');
        document.querySelectorAll('.option-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.option-btn').forEach(b => b.classList.remove('selected'));
                btn.classList.add('selected');
                state.answers.q4 = btn.dataset.val;
                nextBtn.disabled = false;
            });
        });

        nextBtn.addEventListener('click', () => {
            state.step = 'q5';
            render();
        });
    }

    function renderQ5() {
        appContainer.innerHTML = `
            <div class="question-text">🔮 PSTI是什么？ 🔮</div>
            <div class="options">
                <button class="option-btn" data-val="ps">【PS（Photoshop）！】</button>
                <button class="option-btn" data-val="post">【Post！发帖子！】</button>
                <button class="option-btn" data-val="sony">【Sony！索尼！】</button>
                <button class="option-btn" data-val="friend">【Friend！朋友！】</button>
            </div>
            <div id="q5Hint" class="click-hint"></div>
            <button class="action-btn next-btn" id="q5NextBtn" disabled>进入过渡页 →</button>
        `;

        const nextBtn = document.getElementById('q5NextBtn');
        const q5Hint = document.getElementById('q5Hint');
        document.querySelectorAll('.option-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.option-btn').forEach(b => b.classList.remove('selected'));
                btn.classList.add('selected');
                
                const val = btn.dataset.val;
                state.answers.q5 = val;
                
                // 提示文本
                if (val === 'ps') q5Hint.innerText = '🎨 原来是修图大师！';
                else if (val === 'post') q5Hint.innerText = '📝 是分享生活的小可爱～';
                else if (val === 'sony') q5Hint.innerText = '🎮 索尼大法好！';
                else if (val === 'friend') q5Hint.innerText = '🤝 是重感情的宝子！';
                
                nextBtn.disabled = false;
            });
        });

        nextBtn.addEventListener('click', () => {
            state.step = 'transition';
            render();
        });
    }

    function renderTransition() {
        appContainer.innerHTML = `
            <div class="transition-stage">
                <div class="magic-word">PSTI</div>
                <div style="margin-top: 20px; font-size: 1.2rem; color: #82a050;">正在解析你的人格特质...</div>
            </div>
            <button class="action-btn gift-btn" id="unfoldGiftBtn" style="margin-top: 30px;">🎁 点击此处打开礼物 🎁</button>
        `;

        // 延迟绑定事件，避免DOM未加载完成
        setTimeout(() => {
            document.getElementById('unfoldGiftBtn')?.addEventListener('click', () => {
                state.step = 'gift';
                render();
            });
        }, 100);
    }

    function renderGift() {
        appContainer.innerHTML = `
            <div class="message-card">
                <div style="font-size: 2rem; color: #d19648; margin-bottom: 20px;">✨ 你的专属礼物已解锁 ✨</div>
                <div style="font-size: 1.1rem; color: #634828; line-height: 1.8;">
                    无论选择如何，你都是独一无二的自己。<br>
                    愿你永远保持热爱，奔赴山海。
                </div>
                <hr>
                <button class="action-btn" id="finalResultBtn">点击此处进入结果</button>
            </div>
        `;

        document.getElementById('finalResultBtn')?.addEventListener('click', () => {
            // 分支逻辑计算
            const { q1, q2, q3, q4, q5 } = state.answers;
            let branchKey = 'branch2'; // 兜底默认值

            // 核心分支逻辑
            if (q2 === '被爱' && (q3 === 'deadline' || q3 === 'jiachan')) {
                branchKey = 'branch11';
            } else if (q4 === 'past') {
                branchKey = 'branch10';
            } else if (q4 === 'future') {
                branchKey = 'branch11';
            } else if (q2 === '挣脱') {
                branchKey = 'branch1';
            } else if (q2 === '得到') {
                branchKey = 'branch3';
            } else if (q2 === '爱') {
                branchKey = 'branch9';
            } else if (q3 === '勇气') {
                branchKey = 'branch5';
            } else if (q3 === '自由') {
                branchKey = 'branch6';
            } else if (q3 === 'passion') {
                branchKey = 'branch7';
            } else if (q5 === 'friend') {
                branchKey = 'branch8';
            } else if (q1 === 'bad') {
                branchKey = 'branch4';
            }

            // 确保分支存在，否则用兜底
            if (!branches[branchKey]) {
                branchKey = 'branch2';
            }

            state.finalBranchId = branchKey;
            state.step = 'result';
            render();
        });
    }

    function renderResult() {
        const branch = branches[state.finalBranchId];
        // 修复未定义变量问题
        const titleStr = branch.title;
        const contentStr = branch.content;
        
        appContainer.innerHTML = `
            <div style="text-align:center; padding:10px;">
                <div style="font-size:2.4rem; font-weight:700; margin-bottom:15px; color:#ba7830;">✨ ${titleStr} ✨</div>
                <hr>
                <div style="text-align:left; line-height:1.8; font-size:1.1rem; margin:30px 0; color:#5a4020;">${contentStr}</div>
                <button class="action-btn" id="restartBtnAgain" style="margin-top:25px;">让我看看还有什么分支结局！</button>
            </div>
        `;
        
        // 重新开始按钮事件
        document.getElementById('restartBtnAgain')?.addEventListener('click', () => {
            // 重置状态
            state = { 
                step: 'welcome', 
                answers: { q1: null, q2: null, q3: null, q4: null, q5: null }, 
                extraNoteQ3: null, 
                finalBranchId: null 
            };
            render();
            generateSoftClouds(); // 重新生成云朵
        });
    }

    // 彩蛋页面（备用）
    function renderEasterEgg() {
        appContainer.innerHTML = `
            <div class="message-card">
                <div style="font-size: 2rem; color: #82a050; margin-bottom: 20px;">🐣 解锁彩蛋 🐣</div>
                <div style="font-size: 1.1rem; color: #634828; line-height: 1.8;">
                    你发现了隐藏的小惊喜！<br>
                    生活处处有美好，愿你永远保持好奇心～
                </div>
                <button class="action-btn" id="backToResultBtn" style="margin-top: 20px;">返回结果页</button>
            </div>
        `;

        document.getElementById('backToResultBtn')?.addEventListener('click', () => {
            state.step = 'result';
            render();
        });
    }
</script>
</body>
</html>
