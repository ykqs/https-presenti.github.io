<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>PSTI人格测试</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            min-height: 100vh;
            background: linear-gradient(145deg, #fef9e7 0%, #f7e9c0 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', 'Roboto', 'Noto Serif SC', 'Microsoft YaHei', serif;
            padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
            position: relative;
            overflow-x: hidden;
            line-height: 1.6;
        }

        .ambient-field {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            pointer-events: none;
            overflow: hidden;
            background: radial-gradient(circle at 30% 20%, rgba(255,240,160,0.6), rgba(155, 190, 90, 0.15));
        }
        .field-glow {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 40%;
            background: linear-gradient(to top, rgba(160, 195, 85, 0.25), rgba(245, 225, 130, 0.1));
            pointer-events: none;
        }

        .cloud {
            position: absolute;
            background: rgba(255, 254, 245, 0.9);
            border-radius: 1000px;
            box-shadow: 0 20px 35px -8px rgba(0, 0, 0, 0.03), 0 0 0 1px rgba(255,248,220,0.7);
            backdrop-filter: blur(8px);
            animation: floatCloudFast linear infinite;
            z-index: 0;
        }

        @keyframes floatCloudFast {
            0% { transform: translateX(-15%) translateY(0px); }
            50% { transform: translateX(8%) translateY(-15px); }
            100% { transform: translateX(25%) translateY(8px); }
        }

        .app-container {
            position: relative;
            z-index: 20;
            max-width: 720px;
            width: 100%;
            background: rgba(255, 254, 247, 0.96);
            backdrop-filter: blur(5px);
            border-radius: 64px;
            box-shadow: 0 30px 50px -20px rgba(80, 60, 30, 0.25), 0 0 0 1px rgba(220, 190, 110, 0.6);
            overflow: hidden;
            transition: all 0.3s ease;
        }

        .screen {
            padding: 2.5rem 2rem 3rem;
            transition: opacity 0.3s ease;
        }

        .title {
            font-size: clamp(2rem, 6vw, 2.8rem);
            font-weight: 700;
            font-family: 'Noto Serif SC', 'Georgia', serif;
            letter-spacing: 3px;
            background: linear-gradient(135deg, #d19648, #f5c878, #a57535);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 0.5rem;
            text-align: center;
            text-shadow: 2px 2px 15px rgba(255,230,140,0.7);
            line-height: 1.3;
        }

        .question-text {
            font-size: clamp(1.4rem, 5vw, 1.8rem);
            font-weight: 500;
            color: #634828;
            margin: 1.8rem 0 1.5rem;
            text-align: center;
            letter-spacing: 0.5px;
            font-family: 'Noto Serif SC', 'Georgia', serif;
            line-height: 1.5;
        }

        .options {
            display: flex;
            flex-direction: column;
            gap: 15px;
            margin: 25px 0 15px;
        }

        .option-btn {
            background: #fffdf5;
            border: 1px solid #f8e8c8;
            border-radius: 60px;
            padding: 15px 24px;
            font-size: clamp(1rem, 3.5vw, 1.1rem);
            font-weight: 500;
            text-align: left;
            color: #5e4022;
            transition: all 0.25s;
            cursor: pointer;
            font-family: inherit;
            box-shadow: 0 3px 6px rgba(0,0,0,0.03);
            backdrop-filter: blur(3px);
            line-height: 1.5;
        }

        .option-btn:hover {
            background: #fff8eb;
            transform: scale(0.985);
            border-color: #e9cd9c;
            box-shadow: 0 8px 15px -8px rgba(110, 70, 20, 0.18);
        }

        .option-btn.selected {
            background: #fef2e0;
            border-color: #e2b86e;
        }

        .click-hint, .extra-note {
            font-size: 0.9rem;
            color: #c08248;
            margin-top: 15px;
            padding-left: 15px;
            border-left: 3px solid #f9d8a8;
            font-style: normal;
            font-weight: 450;
            line-height: 1.6;
        }

        .extra-note {
            background: #fff9f0;
            border-radius: 32px;
            padding: 12px 20px;
            text-align: center;
            border-left: none;
            margin: 20px 0;
        }

        .action-btn {
            background: #f0c478;
            border: none;
            padding: 14px 28px;
            border-radius: 48px;
            font-weight: 600;
            font-size: clamp(1rem, 3.5vw, 1.1rem);
            color: #402c18;
            cursor: pointer;
            font-family: inherit;
            transition: 0.25s;
            width: 100%;
            text-align: center;
            margin-top: 20px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.06);
            letter-spacing: 1px;
            line-height: 1.5;
        }

        .action-btn:hover {
            background: #e8b058;
            transform: translateY(-3px);
            box-shadow: 0 10px 20px -8px #c88a42;
        }

        .next-btn {
            background: #9dbc68;
            margin-top: 15px;
        }

        .next-btn:hover {
            background: #8da855;
            box-shadow: 0 10px 20px -8px #7a9448;
        }

        .transition-stage {
            text-align: center;
            padding: 60px 20px;
            font-size: 3rem;
            font-weight: 800;
            min-height: 320px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: radial-gradient(ellipse at center, rgba(250, 240, 190, 0.35), transparent);
            border-radius: 56px;
        }

        .magic-word {
            font-size: clamp(2.5rem, 10vw, 3.8rem);
            font-weight: 800;
            font-family: 'Courier New', 'Georgia', monospace;
            letter-spacing: 8px;
            background: linear-gradient(120deg, #e0a858, #fee0a8);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            transition: all 0.8s cubic-bezier(0.2, 0.9, 0.4, 1.1);
        }

        .gift-btn {
            background: #f5d09a;
            margin-top: 35px;
        }

        .gift-btn:hover {
            background: #eec078;
        }

        .message-card {
            background: rgba(255, 253, 245, 0.98);
            border-radius: 56px;
            padding: 30px 25px;
            text-align: center;
            border: 1px solid #f9e8c0;
            backdrop-filter: blur(4px);
            box-shadow: 0 10px 25px rgba(110, 80, 35, 0.09);
        }

        hr {
            margin: 25px 0;
            border: none;
            height: 2px;
            background: linear-gradient(90deg, #f9e8c0, #f0c478, #f9e8c0);
        }

        footer {
            font-size: 0.8rem;
            text-align: center;
            color: #ad7f48;
            margin-top: 30px;
            letter-spacing: 1px;
            line-height: 1.5;
        }

        .green-accent {
            color: #82a050;
        }

        .action-btn:disabled {
            background: #e2d0b0;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
            color: #806848;
        }

        audio {
            position: fixed; opacity: 0; pointer-events: none;
        }
    </style>
</head>
<body>

<audio id="bgm" loop autoplay preload="auto">
    <source src="bgm1.mp3" type="audio/mpeg">
</audio>

<div class="ambient-field" id="cloudField">
    <div class="field-glow"></div>
</div>
<div class="app-container" id="app">
    <div class="screen" id="screenContent"></div>
</div>

<script>
    function generateSoftClouds() {
        const field = document.getElementById('cloudField');
        if (!field) return;
        const existingClouds = field.querySelectorAll('.cloud');
        existingClouds.forEach(c => c.remove());
        
        const cloudCount = 12;
        for (let i = 0; i < cloudCount; i++) {
            const cloud = document.createElement('div');
            cloud.classList.add('cloud');
            const w = 100 + Math.random() * 220;
            const h = 45 + Math.random() * 90;
            cloud.style.width = w + 'px';
            cloud.style.height = h + 'px';
            cloud.style.left = (Math.random() * 100) + '%';
            cloud.style.top = (Math.random() * 85) + '%';
            const duration = 12 + Math.random() * 6;
            cloud.style.animation = `floatCloudFast ${duration}s infinite alternate ease-in-out`;
            cloud.style.animationDelay = (Math.random() * -40) + 's';
            cloud.style.opacity = 0.35 + Math.random() * 0.5;
            cloud.style.background = `radial-gradient(ellipse at 30% 40%, rgba(255,252,225,0.95), rgba(252,240,185,0.6))`;
            field.appendChild(cloud);
        }
    }

    window.addEventListener('load', () => {
        generateSoftClouds();
        window.addEventListener('resize', () => generateSoftClouds());
        
        const audio = document.getElementById('bgm');
        audio.volume = 0.4;
        try { audio.play(); } catch(e) {}
    });

    const branches = {
        branch1: { title: "做一只犀牛吧。", content: `为什么要有老鹰一样的眼睛？<br><br>有时候你想，这个世界上到底有什么比朦胧更美，值得看清。<br><br>那就闭上眼睛吧，别怕，我要带你走。<br><br>我们闻一闻晒了一早上的衬衣、从微波炉里拿出来的咖喱饭、街边的面包房和咖啡店，还有枕头上沾染的洗发水与梦。<br><br>然后我们去池沼上面，去幽谷上面，越过山和森林，越过云和大海，越过太阳那边，越过轻云之外，越过星空世界的无涯极限，凌驾于生活之上。` },
        branch2: { title: "快乐而不是胜利的真理，将被传播至永恒。", content: `生活是一场喜剧。<br><br>一个人是单口，两个人是漫才。<br><br>肢体喜剧交给身体，sketch交给大脑，即兴喜剧交给心，yes, and是我的回音。<br><br>大笑是最难的事，大笑也是最简单的事。<br><br>胜利只是括号里的注脚，我才不把生命活成胜利。<br><br>不像我们班的某某某一样，又想去，又不敢去，又怕不能赢。` },
        branch3: { title: "冷布丁好吃，热不丁也好吃。", content: `我不追求赢，也不追求输。<br><br>不追求快乐，更不追求哭。<br><br>不需要被理解，不需要被记住。<br><br>不需要意义，也不需要归宿。<br><br>我们什么都不需要，我们只需要把热布丁变成冷布丁。<br><br>因为……<br><br>欸欸欸——<br><br>梆梆！<br><br>心急吃不了热布丁。` },
        branch4: { title: "忘掉是一般人能做的唯一的事。", content: `忘掉，忘掉就可以不必再忍受。<br><br>忘掉就可以不必再痛苦。<br><br>忘掉你没有的东西，忘掉别人有的东西，忘掉你失去和以后不能得到的东西……<br><br>——可是不忘掉，是否已经算得到了呢？` },
        branch5: { title: "与神同行。", content: `史铁生说，神的完美在于仁慈。<br><br>仁慈在于，只要你往前走，他总是给路。<br><br>在神的字典里，行与路共用一种解释。<br><br>可能就是因为如此，地球才是圆的吧。<br><br>Fa so la，fa so la so fa mi re mi so la mi do。<br><br>既然如此，还有什么恐怕的呢。<br><br>或许伦敦是一炉终会燃烧的湿柴火，<br><br>或许大海是一片波光粼粼的三棱锥啊。` },
        branch6: { title: "全新的剧本，全新的剧情。", content: `I see a new day is coming.<br><br>写下全新的剧本全新的剧情。<br><br>无论晴天还是风雨，脚步从不会停。<br><br>追逐划过夜空的流星，也不错过日出的绚丽。<br><br>逝去的人推开门就能到达天堂，那一个活人呢？<br><br>一个活人推开门，去哪里都可以吧。` },
        branch7: { title: "没什么能让我吝啬我的表达。", content: `我穿梭在金黄的麦浪，徜徉蔚蓝的大海。<br><br>拨开黑色的夜幕，等待鲜红的日出。<br><br>这个世界不大，<br><br>刚好够我跑来跑去，<br><br>刚好够我为了享受快乐，用尽所有的颜色。<br><br>刚好够我躺在一片乱七八糟的颜料里，心满意足地说：<br><br>我画笔下的世界，都是我的。` },
        branch8: { title: "走吧，一起去寻找芦苇之地！", content: `让我来守护你，把你的手放在我手心。<br><br>守护你，有了彼此就所向无敌。<br><br>在第一百零一阵风里，<br><br>芦苇会长出连自己都不知道的骨头。<br><br>蝴蝶会追上日空中盘旋的鹰。` },
        branch9: { title: "毕竟爱是世间最伟大的魔法。", content: `谁说天上的地上的水与火不可能相见呢相爱呢？<br><br>谁说爱自己想爱的，还讲究条条框框那么多？<br><br>你的梦怎么做，你的passion就让它实现了！<br><br>你爱你的，世界自然会值得！` },
        branch10: { title: "我们还是在这里吧。", content: `我们不要在这里。<br><br>跟我回去十八岁，<br><br>在6:30前出寝室，不要被宿管在楼梯拐角逮到。<br><br>在早自习偷偷吃早餐，不要被巡视的杨艳查到。<br><br>在美术课上速背及时雨，不要被下节课的朱越fail。<br><br>在考完圆锥曲线和数列后祷告，不要被李燕华杀掉。` },
        branch11: { title: "如梦之梦", content: `我祝你在聚光灯下，像一棵南阳街的桃树。<br><br>不必站得笔直。<br><br>歪一点，斜一点，带着莺声燕语，也带着枯叶与枯枝。<br><br>带着去年没好的旧伤，和今年还不想好的固执。<br><br>不必春天驱使，自是良辰吉日。<br><br>桃树上面开花了。<br><br>花瓣被风吹散，落在往来人的肩上。<br><br>每一片都是你的名字，每一片都是你的故事。` }
    };

    let state = {
        step: 'welcome',
        answers: { q1: null, q2: null, q3: null, q4: null, q5: null },
        extraNoteQ3: null,
        finalBranchId: null,
    };

    const appContainer = document.getElementById('screenContent');

    function render() {
        const s = state;
        if (s.step === 'welcome') renderWelcome();
        else if (s.step === 'q1') renderQ1();
        else if (s.step === 'q2') renderQ2();
        else if (s.step === 'q3') renderQ3();
        else if (s.step === 'q4') renderQ4();
        else if (s.step === 'q5') renderQ5();
        else if (s.step === 'transition') renderTransition();
        else if (s.step === 'gift') renderGift();
        else if (s.step === 'result') renderResult();
        else if (s.step === 'easterEgg') renderEasterEgg();
    }

    function renderWelcome() {
        appContainer.innerHTML = `
            <div style="text-align: center; padding: 20px 0 25px;">
                <div class="title">PSTI 人格测试</div>
                              <div style="margin: 30px 0 25px;"><button class="action-btn" id="startBtn" style="background:#f5d09a;">◈ 开启 ◈</button></div>
                          </div>
        `;
        document.getElementById('startBtn')?.addEventListener('click', () => { 
            state.step = 'q1'; 
            render(); 
        });
    }

    function renderQ1() {
        appContainer.innerHTML = `
            <div class="question-text">🌿 今天过得好吗？ 🌿</div>
            <div class="options">
                <button class="option-btn" data-val="great">【爽哉爽哉！】</button>
                <button class="option-btn" data-val="normal">【一如既往。】</button>
                <button class="option-btn" data-val="bad">【并不。】</button>
            </div>
            <div id="clickNote" class="click-hint"></div>
            <button class="action-btn next-btn" id="q1NextBtn" disabled>下一页 →</button>
        `;

        const nextBtn = document.getElementById('q1NextBtn');
        document.querySelectorAll('.option-btn').forEach(btn => {
            btn.addEventListener('click', (e) => {
                document.querySelectorAll('.option-btn').forEach(b => b.classList.remove('selected'));
                btn.classList.add('selected');
                
                const val = btn.dataset.val;
                state.answers.q1 = val;
                const noteDiv = document.getElementById('clickNote');
                
                if (val === 'great') noteDiv.innerText = '☀️ 这么开心？有啥开心的事说出来让我也开心开心！';
                else if (val === 'normal') noteDiv.innerText = '🌙 那就好吃好喝早睡早起！';
                else if (val === 'bad') noteDiv.innerText = '✨ 正好！这个测试就是为了治你。';
                
                nextBtn.disabled = false;
            });
        });

        nextBtn.addEventListener('click', () => {
            state.step = 'q2';
            render();
        });
    }

    function renderQ2() {
        appContainer.innerHTML = `
            <div class="question-text">🍃 你或许想要什么？ 🍃</div>
            <div class="options">
                <button class="option-btn" data-val="挣脱">【我想挣脱。】</button>
                <button class="option-btn" data-val="得到">【我想得到。】</button>
                <button class="option-btn" data-val="爱">【我想爱。】</button>
                <button class="option-btn" data-val="被爱">【我想被爱。】</button>
            </div>
            <button class="action-btn next-btn" id="q2NextBtn" disabled>下一页 →</button>
        `;

        const nextBtn = document.getElementById('q2NextBtn');
        document.querySelectorAll('.option-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.option-btn').forEach(b => b.classList.remove('selected'));
                btn.classList.add('selected');
                state.answers.q2 = btn.dataset.val;
                nextBtn.disabled = false;
            });
        });

        nextBtn.addEventListener('click', () => {
            state.step = 'q3';
            render();
        });
    }

    function renderQ3() {
        appContainer.innerHTML = `
            <div class="question-text">🕊️ 或许需要什么？ 🕊️</div>
            <div class="options">
                <button class="option-btn" data-val="勇气">【勇气】</button>
                <button class="option-btn" data-val="自由">【自由】</button>
                <button class="option-btn" data-val="passion">【Passion！】</button>
                <button class="option-btn" data-val="deadline">【现在立刻马上！谁帮我完成deadline！】</button>
                <button class="option-btn" data-val="jiachan">【家产在我面前酱酱酿酿......（淫笑）】</button>
            </div>
            <div id="specialNote" class="extra-note" style="display:none;"></div>
            <button class="action-btn next-btn" id="q3NextBtn" disabled>下一页 →</button>
        `;

        const nextBtn = document.getElementById('q3NextBtn');
        document.querySelectorAll('.option-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.option-btn').forEach(b => b.classList.remove('selected'));
                btn.classList.add('selected');
                
                let val = btn.dataset.val;
                state.answers.q3 = val;
                nextBtn.disabled = false;
                
                let noteText = '';
                if (val === 'deadline') noteText = '📝 这都敢答？';
                if (val === 'jiachan') noteText = '🍂 咳咳，注意影响。';
                
                if (noteText) {
                    const noteDiv = document.getElementById('specialNote');
                    noteDiv.style.display = 'block';
                    noteDiv.innerText = noteText;
                    state.extraNoteQ3 = noteText;
                }
            });
        });

        nextBtn.addEventListener('click', () => {
            state.step = 'q4';
            render();
        });
    }

    function renderQ4() {
        appContainer.innerHTML = `
            <div class="question-text">⏳ 或许，呃，需要一台时光机？ ⏳</div>
            <div class="options">
                <button class="option-btn" data-val="past">【那就试试回到过去吧！】</button>
                <button class="option-btn" data-val="present">【我并不讨厌现在。】</button>
                <button class="option-btn" data-val="future">【我确实好奇，未来会变好吗？】</button>
            </div>
            <button class="action-btn next-btn" id="q4NextBtn" disabled>下一页 →</button>
        `;

        const nextBtn = document.getElementById('q4NextBtn');
        document.querySelectorAll('.option-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.option-btn').forEach(b => b.classList.remove('selected'));
                btn.classList.add('selected');
                state.answers.q4 = btn.dataset.val;
                nextBtn.disabled = false;
            });
        });

        nextBtn.addEventListener('click', () => {
            state.step = 'q5';
            render();
        });
    }

    function renderQ5() {
        appContainer.innerHTML = `
            <div class="question-text">🌾 所以 PSTI 是什么？🌾</div>
            <div class="options">
                <button class="option-btn" data-val="ps">【Photoshop人格测试。】</button>
                <button class="option-btn" data-val="post">【postscript人格测试。】</button>
                <button class="option-btn" data-val="sony">【索尼游戏主机人格测试。】</button>
                <button class="option-btn" data-val="friend">【朋友发我链接我就点进来了......所以是什么？】</button>
            </div>
            <div id="q5note" class="click-hint"></div>
            <button class="action-btn next-btn" id="q5NextBtn" disabled>查看结果 →</button>
        `;

        const nextBtn = document.getElementById('q5NextBtn');
        document.querySelectorAll('.option-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.option-btn').forEach(b => b.classList.remove('selected'));
                btn.classList.add('selected');
                
                let val = btn.dataset.val;
                state.answers.q5 = val;
                nextBtn.disabled = false;
                
                let msg = '';
                if (val === 'ps') msg = '🎨 设计作业缠上我。';
                else if (val === 'post') msg = '📜 附注：幽默吗。';
                else if (val === 'sony') msg = '🎮 手柄借我玩玩。';
                else if (val === 'friend') msg = '⚠️ 喂，有没有反诈意识啊你！';
                document.getElementById('q5note').innerText = msg;
            });
        });

        nextBtn.addEventListener('click', () => {
            state.step = 'transition';
            render();
        });
    }

    function renderTransition() {
        appContainer.innerHTML = `
            <div class="transition-stage">
                <div id="magicPhrase" class="magic-word">PSTI</div>
                <div style="margin-top: 35px;"><button class="action-btn gift-btn" id="unfoldGiftBtn">🎁 拆礼物吧 🎁</button></div>
            </div>
        `;
        const magicDiv = document.getElementById('magicPhrase');
        if (!magicDiv) return;

        setTimeout(() => {
            magicDiv.innerHTML = `<span>P</span><span style="margin:0 8px;">RE</span><span>S</span><span style="margin:0 8px;">EN</span><span>T</span><span>I</span>`;
            magicDiv.style.letterSpacing = '4px';
            magicDiv.style.fontSize = '3.6rem';
            magicDiv.style.transition = 'all 1.2s ease';
            
            setTimeout(() => {
                magicDiv.innerHTML = `<span style="font-weight:900; background:linear-gradient(145deg,#e7b153,#fbd894); background-clip:text; -webkit-background-clip:text; color:transparent;">PRESENT</span>`;
                magicDiv.style.fontSize = '4rem';
                magicDiv.style.letterSpacing = '6px';
                magicDiv.style.textShadow = "0 0 15px #ffe8b0";
            }, 1500);
        }, 800);

        document.getElementById('unfoldGiftBtn')?.addEventListener('click', () => {
            state.step = 'gift';
            render();
        });
    }

    function renderGift() {
        const birth = new Date(2004, 3, 27);
        const now = new Date();
        
        let years = now.getFullYear() - birth.getFullYear();
        let months = now.getMonth() - birth.getMonth();
        let days = now.getDate() - birth.getDate();
        let hours = now.getHours() - birth.getHours();
        let minutes = now.getMinutes() - birth.getMinutes();
        let seconds = now.getSeconds() - birth.getSeconds();

        if (seconds < 0) { seconds += 60; minutes--; }
        if (minutes < 0) { minutes += 60; hours--; }
        if (hours < 0) { hours += 24; days--; }
        if (days < 0) {
            months--;
            days += new Date(now.getFullYear(), now.getMonth(), 0).getDate();
        }
        if (months < 0) { months += 12; years--; }

        const timeMagic = `祝${years}岁零${months}个月${days}天${hours}小时${minutes}分${seconds}秒的晓光浮野`;
        
        let extraLine = '';
        if (state.answers.q3 === 'deadline') extraLine = '<br><span style="font-size:0.85rem; color:#c2772e;">还“现在立刻马上帮我完成deadline”，你在向谁求助，syx吗？所托非人啊。</span>';
        else if (state.answers.q3 === 'jiachan') extraLine = '<br><span style="font-size:0.85rem; color:#c2772e;">祝家产99。</span>';

        appContainer.innerHTML = `
            <div class="message-card">
                <div style="font-size:2.8rem; margin-bottom:15px;">🎁✨🌿</div>
                <p style="font-size:1.15rem; font-weight:500; margin-bottom:10px;">我绞尽脑汁想出这份生日礼物，我是不是宇宙第一浪漫？！</p>
                <p style="margin-bottom:8px;">天南海北，就是一抬腿的距离，那空间不是问题，或许时间也不是？</p>
                <p style="margin-bottom:8px;">我想啊想啊，我是个擅长做梦的人，那为什么不送你一些梦呢？</p>
                <p style="font-style:italic; color:#b66f2e; margin:15px 0;">${timeMagic}</p>
                <p style="font-weight:bold; background:#fef7e5; border-radius:40px; padding:10px; margin:15px 0;">生活着的每一日，都要快乐！${extraLine}</p>
                <button class="action-btn gift-btn" id="finalResultBtn">◈ 点击此处进入结果 ◈</button>
            </div>
        `;

        const finalBtn = document.getElementById('finalResultBtn');
        finalBtn?.addEventListener('click', () => {
            const q2 = state.answers.q2;
            const q3 = state.answers.q3;
            const q4 = state.answers.q4;
            let branchKey = null;

            if (q2 === '被爱' && (q3 === 'deadline' || q3 === 'jiachan')) {
                branchKey = 'branch11';
            } 
            else if (q4 === 'past') {
                branchKey = 'branch10';
            } else if (q4 === 'future') {
                branchKey = 'branch11';
            } else {
                if (q2 === '挣脱') {
                    if (q3 === '自由' || q3 === '挣脱') branchKey = 'branch1';
                    else if (q3 === '勇气') branchKey = 'branch2';
                    else branchKey = 'branch3';
                } else if (q2 === '得到') {
                    if (q3 === '自由') branchKey = 'branch4';
                    else if (q3 === '勇气') branchKey = 'branch5';
                    else branchKey = 'branch6';
                } else if (q2 === '爱') {
                    if (q3 === '自由') branchKey = 'branch7';
                    else if (q3 === '勇气') branchKey = 'branch8';
                    else branchKey = 'branch9';
                } else {
                    branchKey = 'branch2';
                }
            }

            state.finalBranchId = branchKey;
            if (state.answers.q2 === '被爱') {
                state.step = 'easterEgg';
                render();
            } else {
                state.step = 'result';
                render();
            }
        });
    }

    function renderResult() {
        const branch = branches[state.finalBranchId];
        const titleStr = branch.title;
        const contentStr = branch.content;
             appContainer.innerHTML = `
            <div style="text-align:center; padding:10px;">
                <div style="font-size:2.4rem; font-weight:700; margin-bottom:15px; color:#ba7830;">✨ ${titleStr} ✨</div>
                <hr>
                <div style="text-align:left; line-height:1.8; font-size:1.1rem; margin:30px 0; color:#5a4020;">${contentStr}</div>
                             <button class="action-btn" id="restartBtnAgain" style="margin-top:25px;">让我看看还有什么分支结局！</button>
            </div>
        `;
        document.getElementById('restartBtnAgain')?.addEventListener('click', () => {
            state = { step: 'welcome', answers: { q1: null, q2: null, q3: null, q4: null, q5: null }, extraNoteQ3: null, finalBranchId: null };
            render();
            generateSoftClouds();
        });
    }

    function renderEasterEgg() {
        state.step = 'easterEgg';
        appContainer.innerHTML = `
            <div class="message-card" style="background:#fffdf0; padding:35px 25px;">
                <div style="font-size:2.8rem; margin-bottom:15px;">🐶🐱🐰🦊🐨🐯🐸</div>
                <p style="font-size:1.35rem; font-weight:bold; color:#b5651e; margin-bottom:15px;">此人没有设计【我想被爱】通往的分支结局。</p>
                <p style="font-size:1.1rem; margin-bottom:10px;">因为爱你的人明明一直在这儿，你怎么会不被爱呢！</p>
                <p style="font-size:1.1rem; margin-bottom:15px;"><strong>Trick Question 罢了 ❤️</strong></p>
                <p style="font-family:monospace; margin-bottom:20px;">如有异议，请致电13621776670，我好好说道说道你。</p>
                <button class="action-btn" id="eggBackBtn" style="margin-top:10px;">让我看看还有什么分支结局！</button>
            </div>
        `;
        document.getElementById('eggBackBtn')?.addEventListener('click', () => {
            state = { step: 'welcome', answers: { q1: null, q2: null, q3: null, q4: null, q5: null }, extraNoteQ3: null, finalBranchId: null };
            render();
        });
    }

    render();
</script>
</body>
</html>
