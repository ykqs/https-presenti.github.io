<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>PSTI人格测试 · 原野上的礼物</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700&family=Playfair+Display:ital,wght@0,500;0,600;1,500&display=swap" rel="stylesheet" />
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            background: linear-gradient(165deg, #fff7e8 0%, #fde6cd 40%, #cbe6fe 100%);
            font-family: 'Inter', system-ui, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 2rem 1.5rem;
            position: relative;
            overflow-x: hidden;
        }

        /* 飘浮云朵背景 */
        .floating-cloud {
            position: fixed;
            background: rgba(255, 255, 245, 0.7);
            border-radius: 1000px;
            box-shadow: 0 20px 35px -15px rgba(0,0,0,0.05), inset 0 1px 4px rgba(255,255,240,0.9);
            backdrop-filter: blur(4px);
            z-index: 0;
            pointer-events: none;
            animation: floatCloud linear infinite;
        }

        @keyframes floatCloud {
            0% { transform: translateX(-10%) translateY(0px); }
            50% { transform: translateX(10%) translateY(-12px); }
            100% { transform: translateX(-10%) translateY(0px); }
        }

        /* 主卡片 */
        .page {
            display: none;
            max-width: 680px;
            width: 100%;
            background: rgba(255, 253, 245, 0.82);
            backdrop-filter: blur(14px);
            border-radius: 3rem;
            box-shadow: 0 30px 50px -20px rgba(0, 0, 0, 0.2), 0 8px 20px rgba(255,215,150,0.3);
            padding: 2rem 1.8rem 2.8rem;
            border: 1px solid rgba(255, 250, 210, 0.7);
            position: relative;
            z-index: 10;
            animation: riseUp 0.5s ease-out;
        }

        @keyframes riseUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .active { display: block; }

        /* 进度条 */
        .progress {
            width: 100%;
            height: 6px;
            background: #ffe2b5;
            border-radius: 12px;
            margin-bottom: 2rem;
            overflow: hidden;
        }
        .progress-bar {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, #f9b43a, #ffd966, #7bc9c2);
            border-radius: 12px;
            transition: width 0.4s cubic-bezier(0.2, 0.9, 0.4, 1.1);
        }

        /* 云朵选项容器 */
        .options {
            display: flex;
            flex-direction: column;
            gap: 1rem;
            margin-top: 1rem;
        }

        .cloud-option {
            background: rgba(255, 248, 225, 0.9);
            backdrop-filter: blur(4px);
            border-radius: 60px;
            padding: 0.9rem 1.5rem;
            text-align: center;
            font-weight: 500;
            font-size: 1.05rem;
            color: #b45f1b;
            border: 1px solid #ffefcf;
            box-shadow: 0 8px 16px -10px rgba(0,0,0,0.1), 0 0 0 1px rgba(255,245,190,0.8);
            cursor: pointer;
            transition: all 0.3s ease;
            transform: translateX(0);
            opacity: 1;
        }

        .cloud-option:hover {
            transform: translateY(-4px) scale(1.01);
            background: #fff8e7;
            border-color: #ffcf8a;
            box-shadow: 0 20px 25px -14px #ffbc6e;
            color: #9b4a0e;
        }

        /* 滑入滑出动画 */
        .slide-out {
            animation: slideAway 0.35s forwards ease-in;
        }
        @keyframes slideAway {
            0% { transform: translateX(0); opacity: 1; }
            100% { transform: translateX(120%); opacity: 0; pointer-events: none; }
        }
        .slide-in {
            animation: slideCome 0.4s cubic-bezier(0.2, 0.8, 0.4, 1);
        }
        @keyframes slideCome {
            from { transform: translateX(-30px); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }

        .question {
            font-size: 1.9rem;
            font-weight: 600;
            line-height: 1.3;
            margin-bottom: 1.6rem;
            color: #3b2a1f;
            font-family: 'Playfair Display', serif;
        }

        .question-meta {
            display: flex;
            justify-content: space-between;
            margin-bottom: 1rem;
            color: #bd8a4a;
            font-size: 0.8rem;
            font-weight: 500;
        }

        .title {
            font-size: 3rem;
            font-weight: 700;
            font-family: 'Playfair Display', serif;
            background: linear-gradient(130deg, #e68a2e, #f7bc45, #5f9e92);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            margin-bottom: 1rem;
        }

        .sub {
            color: #c28234;
            border-top: 1px dashed #ffdaa0;
            display: inline-block;
            padding-top: 0.5rem;
        }

        .btn {
            background: #ffdeae;
            border: none;
            padding: 0.8rem 2rem;
            border-radius: 60px;
            font-weight: 600;
            font-size: 1rem;
            color: #864e1c;
            cursor: pointer;
            transition: 0.2s;
            box-shadow: 0 6px 12px rgba(0,0,0,0.05);
        }
        .btn:hover {
            background: #ffcf8a;
            transform: scale(0.97);
        }

        /* 动画文字 */
        .animate-text {
            font-size: 3.8rem;
            font-weight: 800;
            text-align: center;
            margin: 2rem 0;
            background: linear-gradient(125deg, #f0a34b, #f7d06e, #7ac9c0);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            letter-spacing: 3px;
        }

        /* 内容卡片 */
        .content-card {
            background: rgba(255, 252, 235, 0.9);
            border-radius: 2rem;
            padding: 1.8rem;
            margin: 1rem 0;
            border-left: 8px solid #ffbc6e;
            font-size: 1rem;
            line-height: 1.7;
            white-space: pre-line;
            color: #2d3e3a;
        }

        .small-tip {
            font-size: 0.8rem;
            color: #b49b6c;
            margin-top: 1rem;
            font-style: italic;
        }

        /* 底部花草 */
        .grass {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 70px;
            pointer-events: none;
            z-index: 20;
            display: flex;
            justify-content: space-around;
            align-items: flex-end;
            gap: 8px;
            padding: 0 20px;
        }
        .blade {
            width: 6px;
            background: linear-gradient(135deg, #8bc34a, #6f9e3f);
            height: 28px;
            border-radius: 20px 20px 4px 4px;
            transform-origin: bottom;
            animation: sway 3s infinite ease-in-out;
        }
        .blade:nth-child(even) { animation-duration: 2.4s; height: 38px; width: 5px; background: #9ccc65; }
        .blade:nth-child(3n) { animation-duration: 3.5s; height: 22px; background: #aed581; }
        .blade:nth-child(5n+2) { width: 8px; background: #7cb342; }
        @keyframes sway {
            0% { transform: rotate(0deg); }
            50% { transform: rotate(6deg); }
            100% { transform: rotate(-4deg); }
        }
        .flower {
            position: fixed;
            bottom: 15px;
            left: 10%;
            width: 18px;
            height: 18px;
            background: #ffb882;
            border-radius: 50% 50% 0 50%;
            transform: rotate(45deg);
            pointer-events: none;
            z-index: 20;
            box-shadow: 0 0 6px #ffdd99;
            animation: bob 2s infinite;
        }
        .flower2 { left: auto; right: 12%; background: #ffb347; width: 14px; height: 14px; animation-duration: 2.7s; }
        @keyframes bob {
            0% { transform: translateY(0px) rotate(45deg); }
            50% { transform: translateY(-5px) rotate(45deg); }
            100% { transform: translateY(0px) rotate(45deg); }
        }

        /* 结局差异化样式 */
        .final-drama { background: #fff9f0; border-left-color: #f1b558; box-shadow: 0 4px 20px rgba(241,181,88,0.1); }
        .final-music { background: #f0fdf4; border-left-color: #7bc9b6; box-shadow: 0 4px 20px rgba(123,201,182,0.1); }
        .final-book { background: #f5f0ff; border-left-color: #b7a6e5; box-shadow: 0 4px 20px rgba(183,166,229,0.1); }
        .final-high { background: #fff7e0; border-left-color: #f7bc45; box-shadow: 0 4px 20px rgba(247,188,69,0.1); }
        /* 哈利波特魔法特效 */
        .final-harry {
            background: linear-gradient(135deg, #1a1a2e, #16213e);
            color: #f0c27b;
            border-left: 8px solid #ffd700;
            text-shadow: 0 0 3px rgba(255,215,0,0.5);
            position: relative;
            overflow: hidden;
        }
        .final-harry::before {
            content: "⚡";
            position: absolute;
            bottom: 10px;
            right: 20px;
            font-size: 3rem;
            opacity: 0.2;
            pointer-events: none;
        }
        /* 史铁生文艺风格 */
        .final-shit iron {
            background: #fef9e6;
            border-left: 8px solid #8b5a2b;
            font-style: italic;
            font-family: 'Playfair Display', serif;
        }
        /* 音乐剧星光 */
        .final-musical {
            background: linear-gradient(135deg, #fff5e6, #ffe6f0);
            border-left: 8px solid #ff9f4a;
            position: relative;
        }
        .final-musical::after {
            content: "♪ ♫";
            position: absolute;
            bottom: 8px;
            right: 15px;
            font-size: 1.8rem;
            opacity: 0.3;
        }

        @media (max-width: 550px) {
            .page { padding: 1.5rem; }
            .title { font-size: 2.2rem; }
            .question { font-size: 1.5rem; }
            .animate-text { font-size: 2.5rem; }
        }
    </style>
</head>
<body>

<div id="cloudsContainer"></div>
<div class="grass" id="grassArea"></div>
<div class="flower"></div>
<div class="flower flower2"></div>

<!-- 欢迎页 -->
<div class="page active" id="welcome">
    <div class="title">PSTI人格测试</div>
    <div class="sub">· 原野与云 · 一份提前藏好的礼物</div>
    <button class="btn" id="startBtn" style="margin-top: 2rem;">✨ 开启旅程 ✨</button>
</div>

<!-- 答题页 -->
<div class="page" id="quiz">
    <div class="progress"><div class="progress-bar" id="bar"></div></div>
    <div class="question-meta"><span class="q-counter" id="qCounter">第1 / 6题</span><span>🌾 风与选择</span></div>
    <div class="question" id="q"></div>
    <div class="options" id="opts"></div>
</div>

<!-- 动画过渡页 -->
<div class="page" id="animate">
    <div class="animate-text" id="at">PSTI</div>
    <button class="btn" id="openBtn" style="display:none" onclick="toMessage()">🎁 拆礼物吧 🎁</button>
    <div style="text-align:center; margin-top:1rem; color:#c28234;">云朵在聚拢，礼物正在成形...</div>
</div>

<!-- 寄语页 -->
<div class="page" id="message">
    <div class="content-card" id="msgContent"></div>
    <div class="small-tip" id="msgTip"></div>
    <div style="margin-top: 2rem; text-align:center;"><button class="btn" onclick="toFinal()">✦ 继续 ✦</button></div>
</div>

<!-- 最终结果页 -->
<div class="page" id="final">
    <div class="content-card" id="finalContent"></div>
    <div style="margin-top: 2rem; text-align:center;"><button class="btn reset-btn" onclick="fullReset()">🌼 重新测试</button></div>
</div>

<script>
    // 题库
    const questions = [
        {q:"今天过得好吗？",opt:["爽哉爽哉！","一如既往。","并不。"]},
        {q:"你或许想要什么？",opt:["我想挣脱。","我想得到。","我想爱。","我想被爱。"]},
        {q:"或许需要什么？",opt:["勇气","自由","Passion！","现在立刻马上！谁帮我完成deadline！","家产在我面前酱酱酿酿......（淫笑）"]},
        {q:"或许愿意做点什么？",opt:["看点什么？","听点什么？","读点什么？"]},
        {q:"或许，呃，需要一台时光机？",opt:["那就试试回到过去吧！","我并不讨厌现在。","我确实好奇，未来会变好吗？"]},
        {q:"所以PSTI是什么？",opt:["Photoshop人格测试。","postscript人格测试。","索尼游戏主机人格测试。","朋友发我链接我就点进来了......所以是什么？"]}
    ];

    let cur = 0, ans = [];
    let animTimeouts = [];

    function generateClouds() {
        const container = document.getElementById('cloudsContainer');
        if(!container) return;
        for(let i=0;i<12;i++) {
            const cloud = document.createElement('div');
            cloud.classList.add('floating-cloud');
            const size = 70 + Math.random() * 150;
            cloud.style.width = size + 'px';
            cloud.style.height = (size * 0.55) + 'px';
            cloud.style.left = Math.random() * 100 + '%';
            cloud.style.top = Math.random() * 70 + '%';
            cloud.style.animationDuration = 20 + Math.random() * 30 + 's';
            cloud.style.animationDelay = Math.random() * 10 + 's';
            cloud.style.opacity = 0.4 + Math.random() * 0.4;
            container.appendChild(cloud);
        }
    }

    function clearAnim() { if(animTimeouts) animTimeouts.forEach(t=>clearTimeout(t)); animTimeouts=[]; }

    function loadQuestion() {
        if(cur >= questions.length) { ani(); return; }
        const d = questions[cur];
        document.getElementById('q').innerText = d.q;
        const optsDiv = document.getElementById('opts');
        const existingBtns = optsDiv.querySelectorAll('.cloud-option');
        if(existingBtns.length) {
            existingBtns.forEach(btn => { btn.classList.add('slide-out'); });
            setTimeout(() => {
                optsDiv.innerHTML = '';
                renderOptions(d, optsDiv);
            }, 280);
        } else {
            renderOptions(d, optsDiv);
        }
        document.getElementById('qCounter').innerText = `第${cur+1} / ${questions.length}题`;
        const percent = ((cur+1)/questions.length)*100;
        document.getElementById('bar').style.width = percent+'%';
    }

    function renderOptions(d, container) {
        d.opt.forEach((text, idx) => {
            const btn = document.createElement('div');
            btn.className = 'cloud-option slide-in';
            btn.innerText = text;
            btn.onclick = () => {
                btn.classList.add('slide-out');
                setTimeout(() => {
                    ans.push(idx);
                    cur++;
                    loadQuestion();
                }, 200);
            };
            container.appendChild(btn);
        });
    }

    function startPSTI() {
        clearAnim();
        cur = 0; ans = [];
        document.getElementById('welcome').classList.remove('active');
        document.getElementById('quiz').classList.add('active');
        document.getElementById('at').innerText = 'PSTI';
        document.getElementById('openBtn').style.display = 'none';
        document.getElementById('bar').style.width = '0%';
        loadQuestion();
    }

    function ani() {
        document.getElementById('quiz').classList.remove('active');
        document.getElementById('animate').classList.add('active');
        const atEl = document.getElementById('at');
        clearAnim();
        atEl.innerText = 'PSTI';
        const t1 = setTimeout(() => { if(atEl) atEl.innerText = 'PRESENTI'; }, 800);
        const t2 = setTimeout(() => {
            if(atEl) { atEl.innerText = 'PRESENT'; atEl.style.fontWeight = 'bold'; }
            document.getElementById('openBtn').style.display = 'inline-block';
        }, 1800);
        animTimeouts = [t1, t2];
    }

    function getAge() {
        const birth = new Date(2004, 3, 17);
        const now = new Date();
        let diff = now - birth;
        const second = 1000, minute = second*60, hour = minute*60, day = hour*24;
        const month = day*30.4375, year = day*365.25;
        let y = Math.floor(diff/year); diff %= year;
        let m = Math.floor(diff/month); diff %= month;
        let d = Math.floor(diff/day); diff %= day;
        let h = Math.floor(diff/hour); diff %= hour;
        let mi = Math.floor(diff/minute); diff %= minute;
        let s = Math.floor(diff/second);
        return `${y}岁零${m}个月${d}天${h}小时${mi}分${s}秒`;
    }

    function toMessage() {
        clearAnim();
        document.getElementById('animate').classList.remove('active');
        document.getElementById('message').classList.add('active');
        const ageText = getAge();
        const q3 = ans[2];
        let content = `我绞尽脑汁想出这份生日礼物，我是不是宇宙第一浪漫？\\n\\n天南海北，就是一抬腿的距离，那空间不是问题，或许时间也不是？\\n\\n我想啊想啊，我是个擅长做梦的人，那为什么不送你一些梦呢？\\n\\n祝${ageText}的晓光浮野\\n生活着的每一日，都要快乐！`;
        let tip = '';
        if (q3 === 3) tip = '还“现在立刻马上帮我完成deadline”，你在向谁求助，syx吗？所托非人啊。';
        if (q3 === 4) tip = '祝家产99。';
        document.getElementById('msgContent').innerText = content;
        document.getElementById('msgTip').innerText = tip;
    }

    // 根据分支生成结局文案 + 专属样式
    function getPoeticOutcome() {
        const q2 = ans[1], q3 = ans[2], q4 = ans[3], q5 = ans[4];
        
        // 彩蛋：我想被爱
        if (q2 === 3) {
            return { 
                text: `你点了“我想被爱”。\\n\\n窗外的梧桐叶正一片片落进伦敦的暮色里，你坐在书桌前，屏幕的光映在脸上。其实你不需要点这个选项——我早就把答案藏在了每一次秒针跳动里。时差八小时，刚好够我把晚安寄出，你醒来签收。如果你非要一个结局，那就是：你被爱着，从你还没问这个问题的时候，就是了。\\n\\n*爱不设问*`, 
                style: 'final-drama' 
            };
        }

        // 高中语文 / 回忆分支 (回到过去)
        if(q5 === 0) {
            if(q3===0 && q2===0) return { text: `黑板上的粉笔字密密麻麻，你却总盯着钟发呆。后来你按时长大，去了很远的地方。教室里没有反方向的钟，可你总在某个深夜，听见粉笔吱吱呀呀的声音。那些没写完的卷子，没说完的话，都变成了异国枕头上的一小块潮湿。其实不用回去——你走过的每一步，都已经把旧时光带到了新天地里。\\n\\n*达成成就：青云万里*`, style: 'final-high' };
            if(q3===0 && q2===1) return { text: `想得到什么呢？也许是一个拥抱，一句肯定。史铁生说，只要你往前走，他总是给路。路不是找来的，是脚步自己长出来的。你在异国的每一步，都在悄悄收获。不用急，月亮也会慢慢圆。\\n\\n*愿你所求，皆有回响*`, style: 'final-shit iron' };
            if(q3===0 && q2===2) return { text: `想爱，就爱吧。邓布利多说过，不要怜悯死者，怜悯那些活着却没有爱的人。而你心里有爱——它像英格兰冬天里的一捧壁炉，不大，但足够暖。你爱着的时候，世界就近了一寸。\\n\\n*爱从不迷路*`, style: 'final-harry' };
            if(q3===1 && q2===0) return { text: `挣脱的尽头，是自由。自由的尽头，是原谅。你已经在很远的地方了，远到那些旧事追不上你。就让它留在本初子午线的西边吧，而你，向东走。\\n\\n*风与自由同在*`, style: 'final-high' };
            if(q3===1 && q2===1) return { text: `你想要的自由，也许不是远行，而是终于可以安心地做一个普通人。史铁生说，梦想使你迷醉，距离就成了欢乐。你和家乡的距离，刚好够你重新认识自己。得到自由的那一天，你会知道——原来你早就是了。`, style: 'final-shit iron' };
            if(q3===1 && q2===2) return { text: `爱和自由，是两个自由的人互相照见。你爱着的时候，不是绑住谁，而是让彼此都有风可以穿过。你在英国的风里，已经学会这件事了。\\n\\n*爱如原野*`, style: 'final-high' };
            if(q3===2 && q2===0) return { text: `Passion是烧在心里的火，挣脱是打开炉门，让它照亮别人。回忆里的那些不甘心，其实是火种。别怕它烫，它在，你就还活着。\\n\\n*生生不息*`, style: 'final-musical' };
            if(q3===2 && q2===1) return { text: `想得到Passion，其实不用找。你熬夜读完的一本书，你和朋友聊到凌晨的话题，你对着窗外发呆的那个下午——都是。它不在远方，它在你没有设防的时刻，轻轻拍你的肩。`, style: 'final-musical' };
            if(q3===2 && q2===2) return { text: `爱是一种很烈的Passion。它会让你在深夜里想家，也会让你在陌生街头忽然笑出来。你在英国，爱着那里偶尔的晴天，也爱着那里的漫长雨季。这就够了。有爱的人，不荒凉。`, style: 'final-musical' };
        }

        // 话剧 / 喜剧 / 明星大侦探 (看点什么)
        if(q4 === 0) {
